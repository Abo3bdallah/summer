<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التحضير والمتابعة — عداد الصيف</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    
    .tab-active { color: #818cf8; border-top: 3px solid #818cf8; background-color: #1e1b4b; }
    .tab-inactive { color: #94a3b8; border-top: 3px solid transparent; }
    
    /* ألوان الأزرار النشطة للتحضير */
    .btn-early-active { background-color: #1d4ed8 !important; border-color: #3b82f6 !important; color: white !important; }
    .btn-present-active { background-color: #15803d !important; border-color: #22c55e !important; color: white !important; }
    .btn-absent-active { background-color: #b91c1c !important; border-color: #ef4444 !important; color: white !important; }
    .btn-late-active { background-color: #b45309 !important; border-color: #f59e0b !important; color: white !important; }
  </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col">

  <!-- طبقة تسجيل الدخول للمعلمين -->
  <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; z-index:100000; align-items:center; justify-content:center; padding:20px; font-family:'Tajawal', sans-serif;">
    <div style="background:#1e293b; border:1px solid #334155; padding:24px; border-radius:16px; max-width:360px; width:100%; shadow-2xl space-y-5 text-right; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);">
      <div style="text-align:center; margin-bottom:16px;">
        <span style="font-size:36px;">🔑</span>
        <h2 style="font-size:18px; font-weight:800; color:#fff; margin-top:8px;">بوابة المعلمين</h2>
        <p style="font-size:11px; color:#94a3b8; margin-top:4px;">يرجى اختيار اسمك وإدخال كلمة المرور للمتابعة</p>
      </div>
      
      <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:12px;">
        <label style="font-size:11px; font-weight:bold; color:#cbd5e1;">👤 اسم المعلم:</label>
        <select id="loginTeacherSelect" style="width:100%; padding:10px; background:#0f172a; border:1px solid #475569; border-radius:8px; color:#f1f5f9; font-weight:bold; outline:none; font-size:13px;">
          <!-- سيتم تعبئته بواسطة JS -->
        </select>
      </div>
      
      <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:12px;">
        <label style="font-size:11px; font-weight:bold; color:#cbd5e1;">🔑 كلمة المرور:</label>
        <input type="password" id="loginPasswordInput" style="width:100%; padding:10px; background:#0f172a; border:1px solid #475569; border-radius:8px; color:#f1f5f9; font-weight:bold; outline:none; font-size:13px;" placeholder="أدخل كلمة المرور..." />
      </div>
      
      <button id="btnLoginSubmit" style="width:100%; padding:12px; background:#4f46e5; color:white; border:none; border-radius:8px; font-weight:bold; font-size:13px; cursor:pointer; margin-top:10px; box-shadow:0 4px 12px rgba(79, 70, 229, 0.4);">دخول للمنصة</button>
      
      <div id="loginErrorMsg" style="color:#ef4444; font-size:11px; font-weight:bold; text-align:center; display:none; margin-top:12px;">❌ كلمة المرور غير صحيحة!</div>
    </div>
  </div>

  <div id="app" class="w-full min-h-screen bg-slate-900 flex flex-col pb-20 md:pb-6">
    <header class="bg-slate-800 border-b border-slate-700 text-white p-4 shadow-md sticky top-0 z-40 flex justify-between items-center">
      <div class="flex items-center gap-1.5">
        <span class="w-2.5 h-2.5 rounded-full bg-indigo-500 shadow-[0_0_10px_#6366f1]"></span>
        <h1 class="text-sm md:text-lg font-black">
          <span class="inline md:hidden">📋 التحضير</span>
          <span class="hidden md:inline">📋 التحضير والمتابعة</span>
        </h1>
      </div>
      <div class="flex gap-1.5 items-center">
        <button onclick="toggleFilters()" class="text-[10px] md:text-xs font-bold bg-slate-700 hover:bg-slate-600 active:scale-95 px-2 py-1.5 rounded-lg border border-slate-600 transition-all flex items-center gap-0.5 shadow-sm shrink-0">
          <span class="inline md:hidden">⚙️</span>
          <span class="hidden md:inline">⚙️ خيارات</span>
        </button>
        <a id="nav-admin-link" class="text-[10px] md:text-xs font-bold bg-slate-700 hover:bg-slate-600 px-2 py-1.5 rounded-lg border border-slate-600 transition-colors shrink-0 hidden" href="admin.html">
          <span class="inline md:hidden">📋</span>
          <span class="hidden md:inline">📋 الإدارة</span>
        </a>
        <a class="text-[10px] md:text-xs font-bold bg-slate-700 hover:bg-slate-600 px-2 py-1.5 rounded-lg border border-slate-600 transition-colors shrink-0" href="index.html">
          <span class="inline md:hidden">🏠</span>
          <span class="hidden md:inline">🏠 الرئيسية</span>
        </a>
      </div>
    </header>

    <!-- شريط التنقل السفلي للهواتف / علوي للأجهزة الكبيرة -->
    <nav class="bg-slate-800 border-b md:border-t-0 md:border-b border-slate-700 fixed bottom-0 left-0 w-full flex justify-around shadow-2xl z-50 md:relative md:bottom-auto md:left-auto md:shadow-none">
      <button onclick="switchTab('attendance')" id="tab-attendance" class="tab-active flex-1 py-3 flex flex-col items-center transition-all">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
        <span class="text-[10px] font-bold">التحضير</span>
      </button>
      <button onclick="switchTab('tracking')" id="tab-tracking" class="tab-inactive flex-1 py-3 flex flex-col items-center transition-all relative">
        <span id="missing-badge" class="absolute top-1.5 right-6 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full hidden">0</span>
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <span class="text-[10px] font-bold">المتابعة والبحث</span>
      </button>
      <button onclick="switchTab('logs')" id="tab-logs" class="tab-inactive flex-1 py-3 flex flex-col items-center transition-all">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-[10px] font-bold">السجل والإحصاءات</span>
      </button>
      <button onclick="switchTab('students')" id="tab-students" class="tab-inactive flex-1 py-3 flex flex-col items-center transition-all">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <span class="text-[10px] font-bold">الطلاب</span>
      </button>
    </nav>

    <!-- واجهة رفض الوصول لغير المخولين بالتحضير -->
    <div id="accessDeniedOverlay" style="display:none; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; min-height:60vh; font-family:'Tajawal', sans-serif;">
      <div style="background:#1e293b; border:1px solid #334155; padding:30px 20px; border-radius:16px; max-width:320px; width:100%; box-shadow:0 10px 25px -5px rgba(0,0,0,0.3);" class="space-y-4">
        <span style="font-size:40px;">⚠️</span>
        <h2 style="font-weight:800; color:#fff; font-size:16px; margin-top:8px;">عذراً، لا توجد صلاحيات!</h2>
        <p style="font-size:12px; color:#94a3b8; line-height:1.6; margin-top:8px;">ليس لديك صلاحية الوصول لشاشة التحضير والمتابعة حالياً. يرجى مراجعة المعلم <b style="color:#818cf8;">أحمد الذبياني</b> لتفعيل حسابك.</p>
        <div style="margin-top:16px;">
          <button onclick="Store.logout(); location.reload();" style="width:100%; padding:10px; background:#ef4444; color:white; border:none; border-radius:8px; font-weight:bold; font-size:12px; cursor:pointer;">🚪 خروج وتسجيل دخول آخر</button>
        </div>
      </div>
    </div>

    <!-- الكرت الدائم للفلاتر (يمنع الفقدان المتكرر للتركيز وحلقات الأحداث اللانهائية) -->
    <div id="filters-card" class="p-4 bg-slate-800 border-b border-slate-700 hidden shadow-lg text-right">
      <div class="max-w-7xl mx-auto w-full space-y-3.5">
      <!-- المعلم الحالي وزر تسجيل الخروج -->
      <div class="flex flex-col gap-1">
        <label class="block text-xs font-bold text-slate-400">👤 المعلم الحالي:</label>
        <div class="flex gap-2">
          <input type="text" id="supervisorInput" class="w-full p-2.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-200 font-bold outline-none" disabled />
          <button id="btnLogout" class="bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold text-xs px-3.5 rounded-lg transition-all shadow-md shrink-0">تسجيل الخروج</button>
        </div>
      </div>

      <!-- التاريخ والمجموعة جنباً إلى جنب -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">📅 التاريخ:</label>
          <input type="date" id="attDate" class="w-full p-2.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-200 font-bold outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">🏆 تصفية المجموعات:</label>
          <select id="attGroup" class="w-full p-2.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-200 font-bold outline-none focus:border-indigo-500 appearance-none"></select>
        </div>
      </div>

      <!-- البحث السريع كامل العرض -->
      <div class="flex flex-col gap-1">
        <label class="block text-xs font-bold text-slate-400">🔎 ابحث باسم الطالب:</label>
        <input type="text" id="attSearch" class="w-full p-2.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-200 font-bold outline-none focus:border-indigo-500" placeholder="اكتب اسم الطالب هنا للبحث السريع..." />
      </div>
      </div>
    </div>

    <!-- المحتوى الرئيسي للمحاذاة التلقائية للتبويبات -->
    <main id="main-content" class="flex-1 p-4 space-y-4 max-w-7xl mx-auto w-full">
      <div id="tab-content" class="space-y-4">
        <!-- المحتوى التفاعلي للتبويبات سيتم حقنه هنا -->
        <div class="flex justify-center items-center h-48">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500"></div>
        </div>
      </div>
    </main>

  </div>

  <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-700 text-slate-100 px-4 py-3 rounded-xl shadow-2xl text-center z-50 text-sm font-bold opacity-0 transition-opacity pointer-events-none"></div>

  <!-- مكتبات المزامنة ومتجر البيانات المشتركة -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/attendance.js"></script>
</body>
</html>
