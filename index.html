<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | منصة رِحال</title>
  <link rel="icon" type="image/webp" href="logo.webp" />
  <link rel="apple-touch-icon" href="logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="portal-page" data-portal-page="login">
  <main class="portal-shell login-shell">
    <section class="portal-brand" aria-label="منصة رِحال التعليمية">
      <img class="portal-logo-img" src="logo.webp" alt="شعار منصة رِحال" />
      <p class="portal-kicker">بوابة البرنامج التعليمية</p>
      <h1>منصة رِحال</h1>
      <p>دخول موحد وسريع للمعلمين والإدارة</p>
    </section>

    <section class="login-card">
      <div class="login-card-head">
        <span class="login-card-icon">👋</span>
        <div>
          <h2>مرحبًا بعودتك</h2>
          <p>اختر اسمك، ثم أدخل كلمة المرور.</p>
        </div>
      </div>

      <form id="loginForm" class="portal-form">
        <label for="loginTeacher">اسم المستخدم</label>
        <select id="loginTeacher" required>
          <option value="">جارٍ تحميل الأسماء...</option>
        </select>

        <label for="loginPassword">كلمة المرور</label>
        <input id="loginPassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="أدخل كلمة المرور" required />

        <p id="loginError" class="login-error" role="alert" hidden></p>
        <button id="loginSubmit" class="portal-primary" type="submit">دخول إلى المنصة</button>
      </form>

      <p class="login-help">بعد الدخول ستظهر لك الأدوات المناسبة لصلاحيتك فقط.</p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/portal.js"></script>
</body>
</html>
